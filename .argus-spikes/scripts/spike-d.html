<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Spike D - Argus fleet UI throughput</title>
<style>
  body { margin:0; font-family: system-ui, sans-serif; background:#1e1e1e; color:#ccc; }
  #fleet { display:grid; grid-template-columns: repeat(4, 1fr); gap:6px; padding:6px; }
  .card { background:#252526; border:1px solid #333; border-radius:4px; padding:6px; font-size:11px; }
  .card h3 { margin:0 0 4px; font-size:12px; color:#4ec9b0; }
  .tail { height:180px; overflow:hidden; font-family: Consolas, monospace; font-size:10px; line-height:1.3; color:#999; white-space:pre; }
  .bar { height:6px; background:#333; border-radius:3px; margin:4px 0; overflow:hidden; }
  .bar > i { display:block; height:100%; background:#0e639c; width:0%; }
  .meta { display:flex; justify-content:space-between; color:#888; }
  #hud { position:fixed; top:0; right:0; background:#000; color:#0f0; font-family:monospace; font-size:12px; padding:6px; z-index:10; }
</style>
</head>
<body>
<div id="hud">booting...</div>
<div id="fleet"></div>
<script>
const N = 8;
const cards = [];
const fleet = document.getElementById('fleet');
const hud = document.getElementById('hud');

// Build the 8 task cards
for (let i=0;i<N;i++){
  const el = document.createElement('div');
  el.className='card';
  el.innerHTML = `<h3>task-${i}</h3>
    <div class="tail"></div>
    <div class="bar"><i></i></div>
    <div class="meta"><span class="tool">idle</span><span class="elapsed">0.0s</span></div>`;
  fleet.appendChild(el);
  cards.push({
    root: el,
    tailEl: el.querySelector('.tail'),
    barEl: el.querySelector('.bar > i'),
    toolEl: el.querySelector('.tool'),
    elapsedEl: el.querySelector('.elapsed'),
    tail: [],       // rolling lines
    progress: 0,
    start: performance.now(),
    lastTool: 'idle',
  });
}

let TAIL_CAP = 20;
const TOOLS = ['Read','Edit','Bash','Grep','Glob','Write','WebFetch','Task'];

// ---- FPS / long-frame instrumentation ----
let rafOn = false;
let frameCount = 0;
let longFrames = 0;
let lastFrameTs = 0;
let measuring = false;
function rafLoop(ts){
  if (lastFrameTs){
    const dt = ts - lastFrameTs;
    if (measuring){
      frameCount++;
      if (dt > 50) longFrames++;
    }
  }
  lastFrameTs = ts;
  if (rafOn) requestAnimationFrame(rafLoop);
}
rafOn = true;
requestAnimationFrame(rafLoop);

// ---- event application ----
let FORCE_REFLOW = false;
function applyEvent(ev){
  const c = cards[ev.card];
  // rolling tool-call tail line
  c.tail.push(ev.line);
  if (c.tail.length > TAIL_CAP) c.tail.splice(0, c.tail.length - TAIL_CAP);
  c.tailEl.textContent = c.tail.join('\n');
  // progress bar
  c.progress = (c.progress + 0.7) % 100;
  c.barEl.style.width = c.progress.toFixed(1) + '%';
  // tool label
  c.toolEl.textContent = ev.tool;
  // elapsed
  c.elapsedEl.textContent = ((performance.now() - c.start)/1000).toFixed(1) + 's';
  // forced synchronous layout per event (the classic naive-render killer:
  // reading a layout property after a write flushes the layout tree every event)
  if (FORCE_REFLOW){ void c.tailEl.offsetHeight; void c.root.offsetHeight; }
}

let seq = 0;
function makeEvent(){
  const card = (Math.random()*N)|0;
  const tool = TOOLS[(Math.random()*TOOLS.length)|0];
  seq++;
  return { card, tool, line: `${seq} ${tool}(${(Math.random()*9999|0)}) ok` };
}

// ---- driver ----
// naive: apply each event immediately as it is generated (per-event DOM write)
// batched: enqueue events, flush queue every I ms

function runPhase({mode, rate, interval, durationMs}){
  return new Promise(resolve => {
    let processed = 0;
    let queue = [];
    frameCount = 0; longFrames = 0; measuring = true;
    const phaseStart = performance.now();
    const genPeriod = 1000/rate; // ms between generated events
    let genAcc = 0;
    let lastGen = performance.now();
    let flushTimer = null;

    // generator: use a fast setInterval tick and emit floor(elapsed/genPeriod) events
    const genTick = setInterval(() => {
      const now = performance.now();
      genAcc += (now - lastGen);
      lastGen = now;
      let emit = Math.floor(genAcc / genPeriod);
      if (emit > 0){
        genAcc -= emit*genPeriod;
        for (let k=0;k<emit;k++){
          const ev = makeEvent();
          if (mode === 'naive'){ applyEvent(ev); processed++; }
          else { queue.push(ev); }
        }
      }
    }, 4);

    if (mode === 'batched'){
      flushTimer = setInterval(() => {
        if (queue.length){
          const batch = queue; queue = [];
          for (const ev of batch){ applyEvent(ev); processed++; }
        }
      }, interval);
    }

    FORCE_REFLOW = !!arguments[0].forceReflow;
    setTimeout(() => {
      clearInterval(genTick);
      if (flushTimer) clearInterval(flushTimer);
      // final flush for batched
      if (mode === 'batched' && queue.length){
        for (const ev of queue){ applyEvent(ev); processed++; }
        queue = [];
      }
      measuring = false;
      const usedReflow = FORCE_REFLOW;
      FORCE_REFLOW = false;
      const elapsedS = (performance.now() - phaseStart)/1000;
      const fps = frameCount / elapsedS;
      resolve({
        mode, rate,
        interval: interval||null,
        forceReflow: usedReflow,
        tailCap: TAIL_CAP,
        durationS: +elapsedS.toFixed(2),
        eventsProcessed: processed,
        throughputPerS: +(processed/elapsedS).toFixed(1),
        frames: frameCount,
        fps: +fps.toFixed(1),
        longFrames,
        longFramePerS: +(longFrames/elapsedS).toFixed(2),
      });
    }, durationMs);
  });
}

window.__results = null;
window.__done = false;

async function sweep(){
  const results = { started: new Date().toISOString(), phases: [] };
  const DUR = 3000;

  // 1. naive sweep
  for (const rate of [10,50,100,200,500,1000]){
    hud.textContent = `naive @ ${rate}/s`;
    const r = await runPhase({mode:'naive', rate, durationMs:DUR});
    results.phases.push(r);
    await new Promise(res=>setTimeout(res,150));
  }

  // 2. batched sweep at intervals, 500 and 1000 ev/s
  for (const rate of [500,1000]){
    for (const interval of [16,50,100,250]){
      hud.textContent = `batched I=${interval} @ ${rate}/s`;
      const r = await runPhase({mode:'batched', rate, interval, durationMs:DUR});
      results.phases.push(r);
      await new Promise(res=>setTimeout(res,150));
    }
  }

  // 3. tail-length cliff: batched 100ms @ 1000 ev/s with 200-line cap
  TAIL_CAP = 200;
  // also grow the tail visual height so lines actually render tall (DOM size stress)
  for (const c of cards){ c.tailEl.style.height='auto'; c.tailEl.style.maxHeight='none'; }
  hud.textContent = `batched I=100 @ 1000/s TAILCAP=200`;
  {
    const r = await runPhase({mode:'batched', rate:1000, interval:100, durationMs:3000});
    r.note = 'tail-cap-200';
    results.phases.push(r);
  }

  // 4. STRESS: find where naive actually falls over.
  // reset tail cap to the realistic 20 first
  TAIL_CAP = 20;
  for (const c of cards){ c.tailEl.style.height='180px'; c.tail.length=0; c.tailEl.textContent=''; }
  // 4a. naive at very high aggregate rates (coalesced writes, no forced reflow)
  for (const rate of [2000,5000,10000,20000]){
    hud.textContent = `STRESS naive @ ${rate}/s`;
    const r = await runPhase({mode:'naive', rate, durationMs:3000});
    r.note = 'stress-naive-highrate';
    results.phases.push(r);
    await new Promise(res=>setTimeout(res,120));
  }
  // 4b. naive WITH forced synchronous reflow per event (worst-case naive)
  for (const rate of [200,500,1000,2000]){
    hud.textContent = `STRESS naive+reflow @ ${rate}/s`;
    const r = await runPhase({mode:'naive', rate, forceReflow:true, durationMs:3000});
    r.note = 'stress-naive-forced-reflow';
    results.phases.push(r);
    await new Promise(res=>setTimeout(res,120));
  }
  // 4c. batched I=100 protects against forced-reflow cost at 2000 ev/s
  {
    hud.textContent = `STRESS batched I=100 +reflow @ 2000/s`;
    const r = await runPhase({mode:'batched', rate:2000, interval:100, forceReflow:true, durationMs:3000});
    r.note = 'stress-batched-forced-reflow';
    results.phases.push(r);
  }

  results.finished = new Date().toISOString();
  window.__results = results;
  window.__done = true;
  hud.textContent = 'DONE';
}

sweep();
</script>
</body>
</html>
